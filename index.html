<!doctype html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Multi-model cluster analysis result demo"
        />
        <title>Cluster Compare</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="icon" href="./icon/icon.png" type="image/x-icon" />
        <link rel="apple-touch-icon" href="./icon/icon.png" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body
        class="bg-slate-900 text-slate-200 h-screen flex flex-col overflow-hidden"
    >
        <header
            class="z-50 bg-slate-950 border-b border-slate-800 p-4 flex justify-between items-center shrink-0"
        >
            <div class="flex items-center space-x-6">
                <h1 class="text-xl font-bold text-blue-400">
                    <a href="#">Cluster Analysis</a>
                </h1>
                <nav class="flex bg-slate-800 rounded-lg p-1">
                    <button
                        id="nav-cluster"
                        class="px-4 py-1 rounded bg-blue-600 text-white shadow-lg transition"
                    >
                        Cluster
                    </button>
                    <button
                        id="nav-features"
                        class="px-4 py-1 rounded text-slate-400 hover:text-white transition"
                    >
                        Contents
                    </button>
                </nav>
            </div>

            <div class="flex items-center gap-3">
                <label class="text-xs text-slate-300 uppercase tracking-widest"
                    >Type:</label
                >
                <select
                    id="type-selector"
                    class="bg-slate-800 border border-slate-700 rounded px-3 py-1.5 text-sm text-blue-300 outline-none focus:border-blue-500 transition cursor-pointer"
                ></select>
            </div>
        </header>

        <main
            id="cluster-container"
            class="relative flex-grow overflow-auto bg-slate-900 custom-scrollbar"
        >
            <div class="flex items-center justify-center h-full">
                <p
                    class="text-slate-500 animate-pulse font-mono tracking-widest"
                >
                    LOADING CLUSTER DATA...
                </p>
            </div>
        </main>

        <script src="env.js"></script> 
            <script type="module" src="main.js"></script>
        </body>
    </body>
</html>
